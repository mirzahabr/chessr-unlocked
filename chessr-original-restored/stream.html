  "open_stream" runtime message (sent from the React overlay in
  content-scripts/content.js, typically via a button in the injected UI).
  It boots the Stream Mode React app (chunks/stream-Cq9Ik-VD.js) styled by
  assets/stream-DMcmulGQ.css. See project-documentation/PROJECT_REPORT.md
  for how this page fits into the extension's architecture.
-->
